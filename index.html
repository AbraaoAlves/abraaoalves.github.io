    :root {
      --bg: #05070f;
      --bg-soft: #090d1b;
      --text: #eef2ff;
      --muted: #94a1c4;
      --line: rgba(140, 161, 212, 0.32);
      --card: rgba(9, 13, 27, 0.74);
      --card-hover: rgba(19, 27, 51, 0.94);
      --focus: #8ec5ff;
      --gmail: #ea4335;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(1200px 700px at 50% -100px, #111a35 0%, rgba(17, 26, 53, 0) 68%),
        linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Avenir Next", "Segoe UI Variable", "Segoe UI", "Helvetica Neue", sans-serif;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: grid;
      place-items: center;
      padding: 28px 16px;
    }

    .site {
      width: min(860px, 100%);
      text-align: center;
    }

    .identity {
      margin-bottom: 28px;
      animation: rise 460ms ease-out both;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 2.8rem);
      letter-spacing: 0.02em;
      line-height: 1.05;
    }

    .tagline {
      max-width: 56ch;
      margin: 12px auto 0;
      color: var(--muted);
      font-size: clamp(0.98rem, 1.7vw, 1.1rem);
      line-height: 1.5;
    }

    nav {
      animation: rise 520ms ease-out 80ms both;
    }

    .social-grid {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .social-link {
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      min-height: 58px;
      padding: 0 16px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      text-decoration: none;
      transition: transform 180ms ease, background-color 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
      will-change: transform;
      backdrop-filter: blur(2px);
    }

    .social-link:hover {
      background: var(--card-hover);
      border-color: rgba(168, 193, 255, 0.58);
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.24);
    }

    .social-link:active {
      transform: translateY(0) scale(0.985);
    }

    .social-link:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    .icon-wrap {
      width: 20px;
      height: 20px;
      flex: 0 0 20px;
      display: grid;
      place-items: center;
      color: #f6f8ff;
      transition: transform 180ms ease, color 180ms ease;
    }

    .social-link:hover .icon-wrap {
      transform: scale(1.08);
      color: #ffffff;
    }

    .name {
      flex: 1 1 auto;
      text-align: left;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .out {
      width: 18px;
      height: 18px;
      flex: 0 0 18px;
      opacity: 0.76;
      transition: transform 180ms ease, opacity 180ms ease;
    }

    .social-link:hover .out {
      opacity: 1;
      transform: translate(1px, -1px);
    }

    .gmail .icon-wrap {
      color: var(--gmail);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 760px) {
      .social-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
